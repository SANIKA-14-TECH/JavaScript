<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <link

     *{

     }

      }

        width: 100px;

      }
      .cuStomtxt{

  <body>

    <hr />

    <div class="col-sm-4"><input type="text" class="customInput" id="task"></div>

      <div class="col-sm-4"><button class="btn btn-success kg-button2 ms-4" onclick="Add()">Add</button></div>
  </div>

    <div class="col-sm" id="tasks" ></div>
  </div>
</div>

    <script src="app.js"></script>
