<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" rel="stylesheet">

    <style>
        .mainDiv{
            width: 350px;
            height: 700px;
            border: 1px solid black;
            text-align: center;
            margin: auto;
            margin-top: 50px;

        }   
        .mainDiv img{
            width: 80%;
            height: 300px
        }
        .batch{
            width: 15%;
            font-size: 13px;
            height: 15px;
            background-color: red;
            color: white;
            text-align: center;
            padding-top: 1px;
            margin-left: 45px;
            border-radius: 5px;

      
        }
        p{
            font-size: 14px;
            text-align: left;
            padding-left: 10px;
        }
        .fa-star{
            color: orange;
        }
        .fa-cicle{
            font-size: 20px;
            margin-left: 10px;
            text-align: left;
        }   
        .red{
            color: red;
            font-size: 25px;
            text-align: left;
        }
        .grey{
            color: grey;
            font-size: 25px;
            text-align: left;
        }
        .black{
            color: black;
            font-size: 25px;
            text-align: left;
        }
        .icon{
            margin-top: 40px;
            font-weight: bold;
            font-size: 20px;

        }
        .btn{
            width: 40%;
            height: 30px;
            background-color: red;
            color: white;
            border: none;
            font-size: 16px;
            margin-top: 20px;
        }

        .btn:hover{
            cursor: pointer;    
        }
        .img1{
            height: 100%;
            width: 100%;
        }


        
        </style>
</head>
<body>
<div class="mainDiv">
    <img src="red1.jfif" alt=""  class="img1">
  <div class="batch">Bike</div>

  <h2>Mercedez Benz c300 2022</h2>

  <p><i class="fa-solid fa-bolt"></i>Mileage: 40 kmpl</p>
  <p><i class="fa-solid fa-gas-pump"></i>Fuel: 25L</p>
  <p><i class="fa-solid fa-shield-alt"></i>Safety: <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i></p>


  <p>Pick a color:</p>


  <p class="icon"><i class="fa-solid fa-circle red"></i><i class="fa-solid fa-circle grey"></i><i class="fa-solid fa-circle black"></i> $4,50,000</p>

   <button class="btn"><i class="fa-solid fa-cart-arrow-down"></i>Add to Cart</button>
</div>

<script src="script.js">   
</script>
</body>
</html>
