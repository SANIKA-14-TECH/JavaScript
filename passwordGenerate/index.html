<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Password Generator</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .box {
      max-width: 500px;
      margin: 40px auto;
      padding: 25px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 0 10px lightgray;
    }
    .bar {
      height: 10px;
      border-radius: 5px;
    }
  </style>
</head>
<body class="bg-light">

<div class="box">
  <h4>🔐 Password Generator</h4>

  <!-- Length -->
  <label>Password Length</label>
  <input type="number" id="length" class="form-control" value="17">

  <!-- Options -->
  <div class="form-check mt-2">
    <input class="form-check-input" type="checkbox" id="numbers" checked>
    <label class="form-check-label">Include Numbers</label>
  </div>

  <div class="form-check">
    <input class="form-check-input" type="checkbox" id="uppercase" checked>
    <label class="form-check-label">Include Uppercase</label>
  </div>

  <div class="form-check">
    <input class="form-check-input" type="checkbox" id="symbols" checked>
    <label class="form-check-label">Include Special Characters</label>
  </div>

  <div class="form-check">
    <input class="form-check-input" type="checkbox" id="exclude">
    <label class="form-check-label">Exclude ambiguous characters (l, I, 1, O, 0)</label>
  </div>

  <!-- Button -->
  <button class="btn btn-primary mt-3" onclick="generatePassword()">
    Generate Password
  </button>

  <!-- Output -->
  <label class="mt-3">Generated Password</label>
  <input type="password" id="result" class="form-control">

  <!-- Show -->
  <div class="form-check mt-2">
    <input class="form-check-input" type="checkbox" onclick="togglePassword()">
    <label class="form-check-label">Show Password</label>
  </div>

  <!-- Strength -->
  <div class="mt-3">
    <div class="progress">
      <div id="bar" class="progress-bar bar"></div>
    </div>
    <small id="text"></small>
  </div>

  <!-- Copy -->
  <button class="btn btn-secondary mt-3" onclick="copyPassword()">Copy</button>

</div>

<script src="script.js"></script>
</body>
</html>
